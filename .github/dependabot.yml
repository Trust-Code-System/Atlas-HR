version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
      sentry:
        patterns:
          - "@sentry/*"
      supabase:
        patterns:
          - "@supabase/*"
      stripe:
        patterns:
          - "stripe"
          - "@stripe/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
